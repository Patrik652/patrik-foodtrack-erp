name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FoodTrack.sln

      - name: Build
        run: dotnet build FoodTrack.sln --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test FoodTrack.sln
          --configuration Release
          --no-build
          --filter "FullyQualifiedName!~FoodTrack.Mobile"
          --logger "trx;LogFileName=foodtrack-tests.trx"
          --results-directory .artifacts/test-results

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.yml config

      - name: Build API Container
        run: docker compose build foodtrack-api

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foodtrack-test-results
          path: .artifacts/test-results
